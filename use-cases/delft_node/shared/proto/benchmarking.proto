syntax = "proto3";
package delft.benchmarking;

enum LoadingLevel {
  LOADING_LEVEL_UNSPECIFIED = 0;
  LOADING_LEVEL_LOW = 1;
  LOADING_LEVEL_MEDIUM = 2;
  LOADING_LEVEL_HIGH = 3;
}

message LevelSpec {
  int32 n = 1;
  double avg_k = 2;
  int32 diam = 3;
  string dist_type = 4;
  int32 max_k = 5;
}

message Int32List {
  repeated int32 values = 1;
}

message ArtifactReference {
  string protocol = 1;
  string uri = 2;
  string format = 3;
  string media_type = 4;
  map<string, string> metadata = 10;
}

message InterLevelConnection {
  int32 from_level = 1;
  int32 to_level = 2;
  string type = 3;
  double c = 4;
  double gamma = 5;
  map<string, string> metadata = 10;
}

message TransformerDegreePair {
  int32 from_level = 1;
  int32 to_level = 2;
  repeated int32 source_degrees = 3;
  repeated int32 target_degrees = 4;
  map<string, string> metadata = 10;
}

message GridSynthesisRequest {
  repeated LevelSpec level_specs = 1;
  repeated InterLevelConnection connections = 2;
  int32 seed = 3;
  LoadingLevel loading_level = 4;
  int32 ref_sys_id = 5;
  map<string, string> metadata = 10;
}

message GridSynthesisConfig {
  repeated Int32List degrees_by_level = 1;
  repeated int32 diameters_by_level = 2;
  repeated TransformerDegreePair transformer_degrees = 3;
  repeated InterLevelConnection connections = 4;
  int32 seed = 5;
  LoadingLevel loading_level = 6;
  int32 ref_sys_id = 7;
  map<string, string> metadata = 10;
}

message GridNode {
  string id = 1;
  string bus_type = 2;
  double voltage = 3;
  double load_p = 4;
  double load_q = 5;
  double gen_p = 6;
  double gen_q = 7;
  map<string, string> metadata = 20;
}

message GridEdge {
  string source = 1;
  string target = 2;
  double resistance = 3;
  double reactance = 4;
  double susceptance = 5;
  double thermal_limit = 6;
  map<string, string> metadata = 20;
}

message GridTopology {
  bool directed = 1;
  bool multigraph = 2;
  repeated GridNode nodes = 3;
  repeated GridEdge edges = 4;
  map<string, string> metadata = 10;
}

message TimeSeriesPoint {
  int64 index = 1;
  double value = 2;
  string timestamp = 3;
}

message TimeSeriesSeries {
  string series_id = 1;
  string unit = 2;
  repeated TimeSeriesPoint points = 3;
  map<string, string> metadata = 10;
}

message TimeSeriesSet {
  repeated TimeSeriesSeries series = 1;
  map<string, string> metadata = 10;
}

message GridData {
  string grid_id = 1;
  GridTopology topology = 2;
  TimeSeriesSet time_series = 3;
  int32 seed = 4;
  string loading_level = 5;
  int32 ref_sys_id = 6;
  GridSynthesisConfig source_config = 7;
  map<string, string> metadata = 20;
}

enum BenchmarkInputKind {
  BENCHMARK_INPUT_KIND_UNSPECIFIED = 0;
  BENCHMARK_INPUT_KIND_CANONICAL_GRID = 1;
  BENCHMARK_INPUT_KIND_ARTIFACT_REFERENCES = 2;
}

message SourceConfig {
  string format = 1;
  string path = 2;
  map<string, string> metadata = 10;
}

message ScenarioConfig {
  string env_name = 1;
  repeated int32 time_series_ids = 2;
  SourceConfig topology = 3;
  SourceConfig time_series = 4;
  string backend = 5;
  map<string, string> metadata = 10;
}

message BenchmarkConfig {
  int32 max_steps = 1;
  repeated string kpis = 2;
  repeated ScenarioConfig scenarios = 3;
  map<string, string> metadata = 10;
}

message AlgorithmPayload {
  bytes source_bytes = 1;
  string source_uri = 2;
  string encoding = 3;
  string entrypoint = 4;
  map<string, string> metadata = 10;
}

message BenchmarkArtifacts {
  ArtifactReference topology = 1;
  ArtifactReference time_series = 2;
  map<string, string> metadata = 10;
}

// Preferred request envelope. Allows either canonical GridData or artifact refs.
message BenchmarkExecutionSpec {
  BenchmarkConfig config = 1;
  AlgorithmPayload algorithm = 2;
  BenchmarkInputKind input_kind = 3;
  GridData grid_data = 4;
  BenchmarkArtifacts artifacts = 5;
  map<string, string> metadata = 10;
}

message EpisodeResult {
  int32 episode_index = 1;
  int32 scenario_index = 2;
  int32 steps = 3;
  int32 overload_violations = 4;
  double runtime_seconds = 5;
  bool terminated = 6;
}

message NumericSeries {
  repeated double values = 1;
}

message StringAttributes {
  map<string, string> values = 1;
}

// Preferred metric envelope with explicit type selection.
message MetricValue {
  oneof kind {
    double scalar = 1;
    NumericSeries series = 2;
    string text = 3;
    StringAttributes attributes = 4;
  }
}

message ScenarioResult {
  int32 scenario_index = 1;
  string environment = 2;
  repeated int32 executed_time_series_ids = 3;
  repeated EpisodeResult episodes = 4;
  map<string, MetricValue> metrics = 5;
  map<string, string> metadata = 10;
}

message BenchmarkSummary {
  int32 scenario_count = 1;
  int32 episode_count = 2;
  int32 total_overload_violations = 3;
  double total_runtime_seconds = 4;
  double average_episode_length = 5;
  map<string, MetricValue> aggregates = 10;
}

message BenchmarkRunResult {
  repeated ScenarioResult scenarios = 1;
  BenchmarkSummary summary = 2;
  map<string, string> metadata = 10;
}

message BenchmarkResult {
  BenchmarkRunResult structured = 1;
  map<string, string> metadata = 10;
}

message GetBenchmarkResultRequest {
  
}

message GetBenchmarkResultResponse {
  bool success = 1;
  string message = 2;
  BenchmarkResult result = 3;
}

service BenchmarkingService {
  rpc GetBenchmarkResult(GetBenchmarkResultRequest) returns (GetBenchmarkResultResponse);
}

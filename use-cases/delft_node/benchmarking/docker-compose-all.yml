services:
  benchmark-runner:
    image: paulban/aieffect-dutchnode-benchmarking:latest
    build:
      context: ..
      dockerfile: benchmarking/Dockerfile
    container_name: tef-benchmark-runner
    ports:
      - "8004:8080"
      - "50054:50051"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - SELF_URL=http://benchmark-runner:8080
      - GRPC_HOST=benchmark-runner
      - GRPC_PORT=50051
    networks:
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  services:
    name: ai-effect-services
    external: true

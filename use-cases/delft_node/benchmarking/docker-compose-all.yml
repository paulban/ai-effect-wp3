services:
  benchmark-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tef-benchmark-runner
    ports:
      - "8004:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - SELF_URL=http://benchmark-runner:8080
    networks:
      - services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  services:
    name: ai-effect-services
    external: true
